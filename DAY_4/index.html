<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contact Form</title>
    </head>
    <body>
        <h2>Contact Me!</h2>
        <p>Fill out the form below to get in touch with me.</p>
        <form action="https://httpbin.org/get" method="get">
            <label for="firstName">First Name:</label>
            <input type="text" id="firstName" name="firstName" placeholder="eg. Jane" autocomplete="on" required autofocus><br><br>
            <label for="lastName">Last Name:</label>
            <input type="text" id="lastName" name="lastName" placeholder="eg. Doe" required><br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="eg. jane.doe@example.com" required><br><br>
            <label for="phone">Phone:</label>
            <input type="tel" id="phone" name="phone" placeholder="eg. +91 1234567890" pattern="^\+?[1-9]\d{1,14}$" required><br><br>
            <label for="gender">Gender:</label>
            <select id="gender" name="gender">
                <option value="" selected>Select...</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select><br><br>
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" min="0" max="120"><br><br>
            <label for="message">Message:</label><br>
            <textarea id="message" name="message" rows="4" cols="50" placeholder="Type your message here..."></textarea><br><br>
            <input type="submit" value="Submit">
            <input type="submit" value="Reset" onclick="this.form.reset(); return false;">

        </form>
    </body>
</html>
