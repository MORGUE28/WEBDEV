<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>

  <body>
    <header>
      <h1 id="title">Survey Form</h1>
      <p id="description">This is a survey form to take your input and valueable feedback for this course.</p>
    </header>
    <main>

      <form id="survey-form">
        <label for="name" id="name-label">Full Name: </label>
        <input type="text" id="name" placeholder="eg John Doe" required>
        <br><br>
        
        <label for="email" id="email-label">Email: </label>
        <input type="email" id="email" placeholder="eg johndoe@gmail.com" required>
        <br><br>

        <label for="number" id="number-label">Number: </label>
        <input type="number" id="number" min="1" max="12" placeholder='1'>
        <br><br>

        <label for="rating">Rate us:</label>
        <select id="dropdown" name="rating">
          <option value="bad" selected>Bad</option>
          <option value="good">Good</option>
          <option value ="better">Better</option>
          <option value="best">Best</option>
        </select>

         <fieldset>
          <legend>Would you recommend this course to others?</legend>
          <input id="yes-option" type="radio" name="hotel-stay" value="yes" />
          <label for="yes-option">Yes</label>
          <input id="no-option" type="radio" name="hotel-stay" value="no" />
          <label for="no-option">No</label>
        </fieldset>

        <fieldset>
          <legend>
            Why did you choose to stay at our hotel? (Check all that apply)
          </legend>

          <input type="checkbox" id="ads" name="choice" value="ads" />
          <label for="ads">Social Media Ads</label>

          <input
            type="checkbox"
            id="recommendation"
            name="choice"
            value="recommendation"
          />
          <label for="recommendation">Personal Recommendation</label>
          
          <input type="checkbox" id="location" name="choice" value="location" />
          <label for="location">Location</label>

          <input
            checked
            type="checkbox"
            id="reputation"
            name="choice"
            value="reputation"
          />
          <label for="reputation">Reputation</label>
          
          <input type="checkbox" id="price" name="choice" value="price" />
          <label for="price">Price</label>
        </fieldset>

        <label for="comments">Other Comments?</label>
        <textarea cols="30" rows="10" name="comments" id="comments"></textarea>

        <button type="submit" id="submit">Submit</button>   
      </form>
    </main>
  </body>
</html>
