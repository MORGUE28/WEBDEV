<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="./styles.css"/>
    <title>Contact Form</title>
</head>

<body>
    <div class="form-container">
        <form>
            <h2>Contact Us</h2>
            <label for="name">Name: <input id="name" name="name" type="text" required /></label>
            <label for="email">Email: <input id="email" name="email" type="email" required /></label>
            <label for="message">Message: <textarea style="vertical-align: top;"  id="message" name="message" required></textarea></label>
            <button type="submit">Submit</button>
        </form>
    </div>
</body>

</html>
