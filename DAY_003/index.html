<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAY_3 Tables
    </title>
</head>
<body>
    <table>
        <caption>My Daily Schedule</caption>
        <thead>
            <tr>
                <th>Time</th>
                <th>Task</th>
            </tr>
        </thead>
        <tr>
            <td>
                <time datetime="08:00">8 am</time>-<time datetime="11:00">11 am</time>   
            </td>
            <td>
                Task 1
            </td>
        </tr>
        <tbody>
            <tr>
                <td>
                    <time datetime="11:00">11 am</time>-<time datetime="13:00">1 pm</time>   
                </td>
                <td>
                    Task 2
                </td>
            </tr>
            <tr>
                <td>
                    <time datetime="13:00">1 pm</time>-<time datetime="15:00">3 pm</time>   
                </td>
                <td>
                    Task 3
                </td>
            </tr>
            <tr>
                <td>
                    <time datetime="15:00">3 pm</time>-<time datetime="17:00">5 pm</time>   
                </td>
                <td>
                    Task 4
                </td>
            </tr>
            <tr>
                <td>
                    <time datetime="17:00">5 pm</time>-<time datetime="19:00">7 pm</time>   
                </td>
                <td>
                    Task 5
                </td>
            </tr>
            <tr>
                <td rowspan="2">
                    All Other Time
                </td>
                <td> 
                    Task 6
                </td>
            </tr>
            <tr>
                <td>
                    Task 7
                </td>
            </tr>   
        </tbody>
    </table>
</body>
</html>
