<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multimedia Player</title>
</head>

<body>
  <h1>Multimedia Player</h1>
  <section>
    <h2>Track 1: Sailing Away</h2>
    <audio controls aria-label="audio-player">
      <source type="audio/mp3" src="https://cdn.freecodecamp.org/curriculum/js-music-player/sailing-away.mp3">
    </audio>
  </section>
  <section>
    <h2>Video 1: Map Method and how does it work</h2>
    <video controls width="320">
      <source type="video/mp4" src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.mp4">
      <track src="https://cdn.freecodecamp.org/curriculum/labs/what-is-the-map-method-and-how-does-it-work.vtt" kind="subtitles" srclang="en" label="English">
    </video>
  </section>
  <section>
    <h2>Transcript</h2>
    <p>Lorem epsum</p>
  </section>
  
</body>

</html>
